services:
  # The web service (your Express/Vite app)
  - type: web
    name: opinionhub-web
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: opinionhub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # The PostgreSQL database (Solves the SQLite warning issue)
  - type: pgo
    name: opinionhub-db
    plan: free
