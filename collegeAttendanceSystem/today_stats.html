<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Attendance - Today Stats</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    body {
      background-color: #FFE4E1;
      /* Baby Pink */
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      cursor: default;
    }

    header {
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }
    header:hover {
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.907);
    }

    .navbar {
      border-radius: 10px;
    }
    .head1 {
      color: #FF1493;
      font-size: 40px;
      margin-right: auto;
      margin-left: auto;
      display: block;
      font-family: fantasy;
      text-shadow: 2px 2px 4px #000000;
      display: flex;
      letter-spacing: 2px;
    }
    footer {
      color: rgb(0, 0, 0);
      font-size: 18px;
      font-family: fantasy;
      text-shadow: 2px 2px 4px #000000;
    }
    .brand-logo {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    #rollNumberLists {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 30px;
      backdrop-filter: blur(10px);
      margin-bottom: 20px;
    }

    .roll-list-box {
      border: 1px solid black;
      padding: 15px;
      font-weight: bold;
      border-radius: 10px;
      color: #333333;
      flex-basis: 45%;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.907);
    }
    .roll-list-box:hover {
      box-shadow: 0 0 50px rgba(255, 105, 180, 0.907);
    }

    #attendanceReport {
      flex-wrap: wrap;
      gap: 50px;
      padding: 50px 50px !important;
    }

    .chart-container {
      max-width: 45%;
      min-width: 300px;
      margin-bottom: 30px;
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.907);
      background-color: rgba(255, 255, 255, 0.5);
      border-radius: 15px;
      padding: 20px;
    }
    .chart-container:hover {
      box-shadow: 0 0 100px rgba(255, 105, 180, 0.907);
    }

    section {
      padding: 30px 30px 50px 30px;
      backdrop-filter: blur(10px);
      min-height: 60vh;
    }

    canvas:hover {
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.907);
    }

    /* Professional Navbar Custom Styles */
    .nav-custom-link {
      color: #333333 !important;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.5px;
      margin: 0 15px;
      text-decoration: none;
      padding: 0.5rem 0;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
      background: transparent;
      box-shadow: none;
    }
    .nav-custom-link:hover {
      color: #FF1493 !important;
      border-bottom: 2px solid #FF1493;
      transform: translateY(-2px);
    }
    .navbar-toggler {
      background-color: rgba(255, 255, 255, 0.7);
    }

    /* Mobile Dropdown Menu Styling */
    @media (max-width: 991px) {
      .navbar-collapse {
        background: #FFE4E1;
        border-radius: 8px;
        padding: 10px;
        margin-top: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        position: absolute;
        top: 100%;
        left: 15px;
        right: 15px;
        z-index: 1000;
        border: 1px solid #FFB6C1;
      }
      .nav-custom-link {
        color: #333333 !important;
        display: block;
        padding: 10px 15px;
        margin: 2px 0;
        border-radius: 5px;
        border-bottom: none;
      }
      .nav-custom-link:hover {
        background: #FFB6C1;
        color: #FF1493 !important;
        border-bottom: none;
        transform: none;
      }
    }

    @media (max-width: 768px) {
      .head1 {
        font-size: 24px !important;
        letter-spacing: 0px !important;
        text-align: center;
        margin: 0 auto;
      }
      .brand-logo {
        width: 50px !important;
        height: 50px !important;
        margin-right: 5px !important;
      }
      .navbar-brand {
        display: flex;
        align-items: center;
        width: 100%;
      }
      #rollNumberLists {
        flex-direction: column;
      }
      .chart-container {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="https://universitykart.b-cdn.net/Content/upload/admin/kb4boiol.p21.png" alt="Logo"
            class="brand-logo d-inline-block align-text-top"
            style="border-radius: 20px;filter: sepia(100%) saturate(300%) hue-rotate(300deg) brightness(80%) contrast(120%); margin-right: 15px;">
          <h3 class="head1 mb-0">Student Attendance</h3>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav align-items-center mt-3 mt-lg-0">
            <li class="nav-item mb-2 mb-lg-0">
              <a class="nav-custom-link" href="index.html">Home</a>
            </li>
            <li class="nav-item mb-2 mb-lg-0">
              <a class="nav-custom-link" href="out.html">Check Attendance</a>
            </li>
            <li class="nav-item">
              <a class="nav-custom-link" href="calc.html">Detention Probability</a>
            </li>
            <li class="nav-item">
              <a class="nav-custom-link" href="today_stats.html">Today Stats</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <section id="mainSection">
    <div id="loading" class="text-center mt-5">
      <h4>Loading today's stats...</h4>
      <div class="spinner-border text-danger mt-3" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div class="container-fluid" id="rollNumberLists" style="display: none;">
      <div class="roll-list-box">
        <h5><strong>Absent Roll Numbers (<span id="absentTotalCount">0</span>):</strong></h5>
        <p id="absentRolls"></p>
      </div>
      <div class="roll-list-box">
        <h5><strong>Present Roll Numbers (<span id="presentTotalCount">0</span>):</strong></h5>
        <p id="presentRolls"></p>
      </div>
    </div>
    
    <div class="container d-flex justify-content-center" id="attendanceReport" style="display: none !important;">
      <div class="chart-container text-center">
        <h4 class="text-dark text-center mb-4">Attendance Percentage (Pie Chart)</h4>
        <canvas id="pieChart"></canvas>
      </div>

      <div class="chart-container text-center">
        <h4 class="text-dark text-center mb-4">Present/Absent Counts (Bar Chart)</h4>
        <canvas id="countsChart"></canvas>
      </div>
    </div>
  </section>

  <footer>
    <div class="text-center p-3" style="background-color: rgba(255, 20, 147, 0.15); color: #C71585;">
      &copy; 2024 Student Attendance. All rights reserved.
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      fetch('get_today_stats.php')
        .then(response => response.json())
        .then(data => {
          document.getElementById('loading').style.display = 'none';
          
          if (data.status === 'not_submitted') {
            alert("Today attendance not yet given");
            // Optional: redirect to home or leave empty
            // window.location.href = "index.html";
            return;
          } else if (data.status === 'error') {
            alert("Error fetching stats: " + data.message);
            return;
          }

          if (data.status === 'success') {
            displayStats(data);
          }
        })
        .catch(err => {
          console.error("Fetch error:", err);
          document.getElementById('loading').style.display = 'none';
          alert("Could not fetch today's stats.");
        });
    });

    function displayStats(data) {
      document.getElementById('rollNumberLists').style.display = 'flex';
      document.getElementById('attendanceReport').style.setProperty('display', 'flex', 'important');

      const presentCount = data.presentCount;
      const absentCount = data.absentCount;
      const totalStudents = presentCount + absentCount;

      document.getElementById('absentTotalCount').innerText = absentCount;
      document.getElementById('presentTotalCount').innerText = presentCount;

      document.getElementById('absentRolls').innerText = data.absentRolls.length > 0 ? data.absentRolls.join(', ') : 'None';
      document.getElementById('presentRolls').innerText = data.presentRolls.length > 0 ? data.presentRolls.join(', ') : 'None';

      const presentColor = 'rgba(66, 133, 244, 0.7)';
      const absentColor = 'rgba(219, 68, 55, 0.7)';
      const presentBorder = 'rgba(66, 133, 244, 1)';
      const absentBorder = 'rgba(219, 68, 55, 1)';

      let presentPercent = totalStudents > 0 ? ((presentCount / totalStudents) * 100).toFixed(1) : 0;
      let absentPercent = totalStudents > 0 ? ((absentCount / totalStudents) * 100).toFixed(1) : 0;

      // Pie Chart
      const pieCtx = document.getElementById('pieChart').getContext('2d');
      new Chart(pieCtx, {
        type: 'pie',
        data: {
          labels: [`Present (${presentCount})`, `Absent (${absentCount})`],
          datasets: [{
            data: [presentPercent, absentPercent],
            backgroundColor: [presentColor, absentColor],
            borderColor: [presentBorder, absentBorder],
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'bottom', labels: { color: 'black' } },
            tooltip: {
              callbacks: {
                label: (context) => context.label + ': ' + context.parsed + "%"
              }
            }
          },
          animation: { duration: 1500 }
        }
      });

      // Bar Chart
      const countsCtx = document.getElementById('countsChart').getContext('2d');
      new Chart(countsCtx, {
        type: 'bar',
        data: {
          labels: ['Present', 'Absent'],
          datasets: [{
            label: 'Number of Students',
            data: [presentCount, absentCount],
            backgroundColor: [presentColor, absentColor],
            borderColor: [presentBorder, absentBorder],
            borderWidth: 2,
            borderRadius: 10
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true,
              max: totalStudents > 0 ? totalStudents : 43,
              ticks: { stepSize: 1, color: 'black' }
            },
            x: { ticks: { color: 'black' } }
          },
          animation: { duration: 1500 }
        }
      });
    }
  </script>
</body>

</html>
