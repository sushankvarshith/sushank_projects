<div class="container-fluid py-5" id="attendanceCalcSection">
  <div class="card p-4 mx-auto" style="max-width:500px; background-color:rgba(255,105,180,0.2); box-shadow:0 0 30px rgba(255,105,180,0.9); border-radius:15px; margin-top: 50px; margin-bottom: 50px; backdrop-filter: blur(10px);">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

crossorigin="anonymous"></script>
<script>
const rollToNameMap = {
    '24711A3301': 'A ROHITHA',
    '24711A3302': 'A PRANOOPA',
    '24711A3303': 'A SARIGA',
    '24711A3304': 'A DEEPTHI',
    '24711A3306': 'K BHAVITHA',
    '24711A3307': 'B RAJESWARI',
    '24711A3308': 'CH HARSHINI',
    '24711A3311': 'CH TEJASWINI',
    '24711A3312': 'CH DEVA NANDINI',
    '24711A3313': 'D ROSHINI',
    '24711A3314': 'D THANUSHYA',
    '24711A3315': 'D AASRITHA',
    '24711A3317': 'D SAHITHI',
    '24711A3318': 'D VIJAYA',
    '24711A3320': 'G SUFRONIA',
    '24711A3321': 'G ASRITHA',
    '24711A3322': 'G TEJASWINI',
    '24711A3324': 'I BLESSY',
    '24711A3325': 'J SIRI',
    '24711A3327': 'K SAHITHYA',
    '24711A3328': 'K SUSHMA',
    '24711A3329': 'K HARIPRIYA',
    '24711A3330': 'K YOSHITHA',
    '24711A3331': 'K HEMA',
    '24711A3332': 'M VINITHA',
    '24711A3334': 'M MUSKAN',
    '24711A3336': 'M PRIYADARSHINI',
    '24711A3337': 'N PRIYA DARSHINI',
    '24711A3338': 'P NANDINI',
    '24711A3341': 'G MOUNIKA',
    '24711A3343': 'P NIKHILA',
    '24711A3344': 'P THANUSHA',
    '24711A3346': 'SK AMEENA',
    '24711A3348': 'SK NAZIYA',
    '24711A3350': 'SK RUBIYA',
    '24711A3353': 'SK SHEENA',
    '24711A3355': 'SK YASMIN',
    '24711A3357': 'S SEETHAL',
    '24711A3358': 'T SRILATHA',
    '24711A3364': 'V DEEPSHIKA',
    '25715A3302': 'B SRUTHI',
    '25715A3303': 'B SPURTHI',
    '25715A3305': 'SK FARSHAD',
};



document.getElementById('calcBtn').addEventListener('click', () => {
    const roll = document.getElementById('rollInput').value.trim().toUpperCase();
    const name = rollToNameMap[roll] || 'Unknown Student';
    let current = parseFloat(document.getElementById('currentPerc').value);
    let remaining = parseInt(document.getElementById('remainingDays').value);

    if (isNaN(current) || isNaN(remaining)) {
        alert('Please enter valid numbers!');
        return;
    }

    const perPresent = 2.5; 
    const perAbsent = 3.0; 
    const target = 75;

    let foundMatch = false;
    let minDaysToAttend = 0;
    let maxLeavesPossible = 0;

    for (let i = 0; i <= remaining; i++) {
        let leaves = remaining - i;
        
        let projectedAttendance = current + (i * perPresent) - (leaves * perAbsent);

        if (projectedAttendance >= target) {
            minDaysToAttend = i;
            maxLeavesPossible = leaves;
            foundMatch = true;
            break; 
        }
    }

    let result = `Student Name: ${name}\n`;
    result += `Current: ${current}% | Remaining: ${remaining} days\n\n`;

    if (foundMatch) {
        result += `current Status:  Dont Worry... It's Possible to reach 75% ✅\n`;
        result += `Minimum Days to Attend: ${minDaysToAttend}\n`;
        result += `Maximum Leaves Allowed to take : ${maxLeavesPossible}`;
    } else {
        let maxPossible = current + (remaining * perPresent);
        result += `Status: Detention Possibility!!.. Be carefull ⚠️\n`;
        result += `Even if you attend all days, you only reach ${maxPossible}%`;
    }

    document.getElementById('calcResult').innerText = result;
    document.getElementById('calcResult').scrollIntoView({ behavior: 'smooth' });
});
</script>
